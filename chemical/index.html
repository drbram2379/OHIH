/* Dual Strategy Fetcher to eliminate CORS blocks */
async function fetchTabCsv(tab){
  const r = await fetch(gvizUrl(tab), {cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.text();
}

function fetchTabJsonp(tab){
  return new Promise((resolve, reject) => {
    const cb = '__gviz_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; script.remove(); }
    window[cb] = resp => {
      cleanup();
      if (!resp || resp.status === 'error') return reject(new Error('Gviz error'));
      try { resolve(gvizToCsvString(resp)); } catch(e){ reject(e); }
    };
    script.src = `https://docs.google.com/spreadsheets/d/${LIVE.sheetId}/gviz/tq?tqx=out:json;responseHandler:${cb}&headers=1&sheet=${encodeURIComponent(tab)}&t=${Date.now()}`;
    script.onerror = () => { cleanup(); reject(new Error('Script blocked')); };
    document.head.appendChild(script);
  });
}

function gvizToCsvString(resp) {
  const t = resp.table || {};
  const escapeCsv = v => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
  const headers = (t.cols || []).map(c => c.label || '');
  const lines = [headers.map(escapeCsv).join(',')];
  (t.rows || []).forEach(r => {
    const row = (r.c || []).map(cell => {
      if (!cell) return '';
      if (cell.f != null) return cell.f;
      return cell.v != null ? String(cell.v) : '';
    });
    lines.push(row.map(escapeCsv).join(','));
  });
  return lines.join('\n');
}

async function fetchTab(tab){
  try { return await fetchTabCsv(tab); }
  catch(e) { return await fetchTabJsonp(tab); }
}

/* ---- RFC-4180 CSV parser → array of row-arrays ---- */
function parseCSV(text){
  const rows=[]; let row=[], val='', q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){val+='"';i++;} else q=false;} else val+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(val);val='';}
      else if(c==='\n'){row.push(val);rows.push(row);row=[];val='';}
      else if(c!=='\r')val+=c; }
  }
  if(val.length||row.length){row.push(val);rows.push(row);}
  return rows.filter(r=>r.some(x=>x!==''));
}
/* ---- header → list of {get(name)} record objects ---- */
function toRecords(rows){
  if(!rows.length) return [];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const idx=name=>head.findIndex(h=>h.includes(name));
  return rows.slice(1).map(r=>({
    get:(name)=>{const i=idx(name); return i<0?'':(r[i]||'').trim();}
  }));
}
/* ---- helpers ---- */
const num = v => {const m=String(v).match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):NaN;};
const clamp15 = v => Math.max(1,Math.min(5, isNaN(v)?3:Math.round(v)));
function isCMR(ghs){ return /carcinog|mutagen|repro|h3(40|45|50|51|60|61)/i.test(ghs||''); }

/* ---- governed monitoring-gap factor (MGF) from cadence + last date ---- */
function cadenceDays(freq){
  const f=(freq||'').toLowerCase();
  if(f.includes('daily'))return 1; if(f.includes('shift'))return 1;
  if(f.includes('week'))return 7; if(f.includes('month'))return 30;
  if(f.includes('quarter'))return 90; if(f.includes('semi')||f.includes('6 month'))return 182;
  if(f.includes('annual')||f.includes('year'))return 365; return 180;
}
function mgfFor(required, lastDate, freq){
  const req=/y|required|exposure|dust|volatile|gas|fume|mist|vapor|true/i.test(required||'');
  if(!req) return 2;
  const d=Date.parse(lastDate);
  if(isNaN(d)) return 5;
  const ageRatio=(Date.now()-d)/(cadenceDays(freq)*864e5);
  if(ageRatio>1.5) return 5;
  if(ageRatio>1)   return 4;
  if(ageRatio>0.66)return 3; if(ageRatio>0.33)return 2; return 1;
}
/* ---- FROZEN CEPI (S1 §7.8) with governance MGF=5∧HWF≥4 floor (S1 §7.9) ---- */
function cepiOf(HWF,ELF,MGF,SGF,SPF){
  let v = 0.25*HWF + 0.25*ELF + 0.25*MGF + 0.125*SGF + 0.125*SPF;
  if(MGF===5 && HWF>=4) v=Math.max(v,2.7);
  return Math.max(1,Math.min(5,v));
}
const bandOf = v => v<1.8?'Low':v<2.7?'Moderate':v<3.5?'Significant':v<4.3?'High':'Critical';

/* ---- build one governed pairing record from a raw register row ---- */
function pairingFromRow(rec, siteId){
  const HWF=clamp15(num(rec.get('hazard severity')));
  const ELF=clamp15(num(rec.get('exposure potential')));
  const SGF=3, SPF=3;
  const MGF=mgfFor(rec.get('monitoring required'), rec.get('last date'), rec.get('sampling frequency'));
  const cepi=cepiOf(HWF,ELF,MGF,SGF,SPF);
  return {
    site:siteId, agent:rec.get('chemical name')||'Unspecified', cas:rec.get('cas')||'—',
    family:rec.get('chemical category')||'Unclassified', ghs:rec.get('ghs'),
    seg:rec.get('similar exposure group')||rec.get('department')||'Unassigned',
    cmr:isCMR(rec.get('ghs')), HWF,ELF,MGF,SGF,SPF, cepi, band:bandOf(cepi),
    required:/y|required|exposure|dust|volatile|gas|fume|mist|vapor|true/i.test(rec.get('monitoring required')||''),
    last:rec.get('last date'), freq:rec.get('sampling frequency'), mtype:rec.get('monitoring type'),
    risk:rec.get('risk level')
  };
}

/* ---- transform live pairings → dashboard data model ---- */
function transform(allPairings, pop){
  const bands=['Low','Moderate','Significant','High','Critical'];
  const sites = LIVE.siteTabs.map((s,i)=>{
    const ps=allPairings.filter(p=>p.site===s.id);
    const mix={Low:0,Moderate:0,Significant:0,High:0,Critical:0};
    ps.forEach(p=>mix[p.band]++);
    const reqd=ps.filter(p=>p.required);
    const current=reqd.filter(p=>p.MGF<=2).length;
    const overdue=reqd.filter(p=>p.MGF>=4).length;
    const due30 =reqd.filter(p=>p.MGF===3).length;
    const coverage=reqd.length?Math.round(current/reqd.length*100):0;
    let maturity=1;
    if(ps.length) maturity=2;
    if(ps.some(p=>p.seg && p.seg!=='Unassigned')) maturity=3;
    if(reqd.length) maturity=4;
    if(coverage>=80) maturity=5;
    if(coverage>=95 && overdue===0) maturity=6;
    return {id:s.id, co:s.co, name:s.name, maturity,
      pop:pop[s.id]||ps.length*8||0, coverage, overdue, due30,
      cepi:mix, _burden:(mix.High+mix.Critical)*Math.max(1,(pop[s.id]||100)/100)};
  });
  [...sites].sort((a,b)=>b._burden-a._burden).forEach((s,i)=>s.cebiRank=i+1);

  const byAgent={};
  allPairings.forEach(p=>{
    const k=p.agent; if(!byAgent[k]) byAgent[k]={name:k,cas:p.cas,family:p.family,cmr:p.cmr,maxHWF:p.HWF,n:0};
    byAgent[k].n++; byAgent[k].maxHWF=Math.max(byAgent[k].maxHWF,p.HWF); byAgent[k].cmr=byAgent[k].cmr||p.cmr;
  });
  let agentArr=Object.values(byAgent)
    .filter(a=>a.maxHWF>=4||a.cmr)
    .map(a=>({name:a.name,family:a.family,cas:a.cas||'—',tier:(a.maxHWF>=5||a.cmr)?1:2,_n:a.n,cmr:a.cmr}))
    .sort((x,y)=>y._n-x._n).slice(0,8);
  const maxN=Math.max(1,...agentArr.map(a=>a._n));
  agentArr.forEach(a=>a.burden=Math.round(a._n/maxN*100));

  const bySeg={};
  allPairings.forEach(p=>{
    const k=p.seg+'|'+p.site; if(!bySeg[k]||p.cepi>bySeg[k].cepi) bySeg[k]={...p, n:(bySeg[k]?.n||0)+1};
    else bySeg[k].n=(bySeg[k].n||0)+1;
  });
  const segArr=Object.values(bySeg).sort((a,b)=>b.cepi-a.cepi).slice(0,8).map(p=>({
    seg:p.seg, site:p.site, agent:p.agent, cepi:+p.cepi.toFixed(1), band:p.band,
    pop:p.n, status:p.band==='Critical'||p.band==='High'?(p.MGF>=4?'Unacceptable':'Uncertain'):'Acceptable',
    mgf:p.MGF, hwf:p.HWF, last:p.last||'—',
    driver:p.MGF===5?'MGF=5 (no current data) at high hazard':p.cmr?'CMR hazard (HWF high)':'Routine'
  }));

  const mix={Low:0,Moderate:0,Significant:0,High:0,Critical:0};
  sites.forEach(s=>bands.forEach(b=>mix[b]+=s.cepi[b]));
  const totReq=allPairings.filter(p=>p.required);
  const ent={
    cepiMix:mix, cebiTrend:'rising',
    criticalAgents:{t1:agentArr.filter(a=>a.tier===1).length, t2:agentArr.filter(a=>a.tier===2).length,
      coverage:Math.round(sites.reduce((a,s)=>a+s.coverage*s.pop,0)/Math.max(1,sites.reduce((a,s)=>a+s.pop,0)))},
    maturity:Math.min(...sites.map(s=>s.maturity)),
    coverage:Math.round(sites.reduce((a,s)=>a+s.coverage*s.pop,0)/sites.reduce((a,s)=>a+s.pop,0)),
    overdue:sites.reduce((a,s)=>a+s.overdue,0),
    due30:sites.reduce((a,s)=>a+s.due30,0),
    due60:totReq.filter(p=>p.MGF===3).length+totReq.filter(p=>p.MGF===2).length,
    due90:totReq.filter(p=>p.MGF<=3).length,
    caOverdue:allPairings.filter(p=>(p.cmr||p.HWF>=5)&&p.MGF>=4).length,
    surveillanceCoverage:81, highRiskGroups:segArr.filter(s=>s.band==='Significant'||s.band==='High'||s.band==='Critical').length,
    activeSEGs:Object.keys(bySeg).length
  };
  return {sites, agents:agentArr, segs:segArr, enterprise:ent};
}

/* ---- ORCHESTRATION: load → transform → assign → render ---- */
async function loadLive(){
  setBadge('loading');
  try{
    const [mapTxt, demoTxt, ...siteTxts] = await Promise.all([
      fetchTab(LIVE.mapTab).catch(()=>''),
      fetchTab(LIVE.demoTab).catch(()=>''),
      ...LIVE.siteTabs.map(s=>fetchTab(s.tab).catch(e=>{console.warn(e);return '';}))
    ]);
    const loaded = siteTxts.filter(t=>t).length;
    if(loaded===0) throw new Error('No sheets reached');
    const demoRecs = demoTxt ? toRecords(parseCSV(demoTxt)) : [];
    const pop = popBySite(demoRecs);
    let pairings=[];
    siteTxts.forEach((txt,i)=>{
      if(!txt) return;
      const recs=toRecords(parseCSV(txt));
      recs.forEach(r=>{ if(r.get('chemical name')) pairings.push(pairingFromRow(r, LIVE.siteTabs[i].id)); });
    });
    if(!pairings.length) throw new Error('No rows found');
    const t=transform(pairings, pop);
    SITES=t.sites; AGENTS=t.agents; SEGS=t.segs; ENTERPRISE=t.enterprise;
    REGISTERS=buildRegisters(); regKeys=Object.keys(REGISTERS);
    DATA_SOURCE='live'; DATA_AS_OF=new Date();
    DATA_COMPLETENESS=Math.round(loaded/LIVE.siteTabs.length*100);
    initFilters(); renderRegisters(); renderAll();
    setBadge('live');
  }catch(err){
    console.warn('Live fallback invoked:', err.message);
    SITES=DEFAULT_SITES; AGENTS=DEFAULT_AGENTS; SEGS=DEFAULT_SEGS; ENTERPRISE=DEFAULT_ENTERPRISE;
    REGISTERS=buildRegisters(); regKeys=Object.keys(REGISTERS);
    DATA_SOURCE='fallback';
    initFilters(); renderRegisters(); renderAll();
    setBadge('fallback', err.message);
  }
}

function setBadge(state, msg){
  const el=$('#freshBadge'); if(!el) return;
  const t=DATA_AS_OF?DATA_AS_OF.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
  if(state==='loading'){ el.textContent='Data freshness: connecting to Google Sheet…'; el.style.color=''; }
  else if(state==='live'){ el.textContent=`● LIVE · Google Sheet · as of ${t} · completeness ${DATA_COMPLETENESS}%`; el.style.color='var(--ok)'; }
  else { el.textContent=`▲ Sheet unreachable — showing governed baseline (${msg||'offline'})`; el.style.color='var(--warn)'; }
}

function renderMatrix(){
  const m=$('#confMatrix');
  const covBins=['<50','50-69','70-79','80-89','90-94','≥95'];
  let html='<div class="mh"></div>'+covBins.map(c=>`<div class="mh">${c}%</div>`).join('');
  for(let lvl=6;lvl>=1;lvl--){
    html+=`<div class="ml">L${lvl}</div>`;
    covBins.forEach((cb,ci)=>{
      const site=activeSites().find(s=>s.maturity===lvl && binIndex(s.coverage)===ci);
      if(site){
        const blind=site.coverage<60;
        const c=blind?'exp':site.coverage>=90?'ok':site.coverage>=70?'warn':'crit';
        html+=`<div class="cell" style="background:var(--${c}-bg);border:1px solid var(--${c}-line);color:var(--${c})" title="${site.name}: ${site.coverage}% coverage, L${lvl}">${site.id}${blind?' ⚑':''}</div>`;
      } else html+=`<div class="cell" style="background:var(--surface-2);border:1px solid var(--line)"></div>`;
    });
  }
  m.innerHTML=html;
}

function fmtCell(c){
  const map={'Critical':'exp','Unacceptable':'exp','Overdue':'exp','OVERDUE':'exp','High':'crit','Uncertain':'warn','Significant':'warn','Moderate':'ok','Low':'ok','Acceptable':'ok','Current':'ok','Tier 1':'exp','Tier 2':'warn'};
  if(map[c])return `<span class="tag t-${map[c]}">${c}</span>`;
  if(typeof c==='string'&&c.includes('CMR'))return `<span class="tag t-crit">${c}</span>`;
  if(c==='No data')return `<span class="tag t-miss">No data</span>`;
  if(typeof c==='string'&&c.startsWith('⚑'))return `<span class="tag t-exp">${c}</span>`;
  if(typeof c==='string'&&c.includes('suppressed'))return `<span class="tag t-miss">${c}</span>`;
  return c;
}

  const matchSite = SITES.find(x=>x.id===scope.site);
  const site=scope.site==='ALL'?'All sites':(matchSite ? matchSite.name : scope.site);
  $('#breadcrumb').textContent=`${co} › ${site} › Department › SEG › Agent › Assessment › Monitoring › Health Outcome › Medical Outcome`;
}

function renderAlerts(){
  const sites=activeSites();
  const overdue=sites.reduce((a,s)=>a+s.overdue,0);
  const critPair=aggCepi(sites).Critical;
  $('#execAlert .txt').innerHTML=`<b>Executive attention:</b> ${critPair} SEG–agent pairings are at Critical Priority and ${ENTERPRISE.caOverdue} Tier-1 critical-agent campaigns are overdue. CEBI is rising for a second consecutive cycle — an Executive resourcing review is the governed response Mom.`;
  $('#situationText').textContent=NARRATIVE.p1[0][1];
  $('#situationText2').textContent=NARRATIVE.p2[0][1];
}

function renderAll(){
  renderKPIs();renderRisk();renderAgents();renderBubble();renderMatrix();renderPyramid();
  renderNarrative('#narrative1',NARRATIVE.p1);renderNarrative('#narrative3',NARRATIVE.p3);
  renderActions();renderCalendar();renderCATracker();renderTrends();renderSitePerf();
  renderActionRegister();renderBreadcrumb();renderAlerts();
}

function goPage(id){
  $$('.tab').forEach(t=>t.setAttribute('aria-selected',t.dataset.page===id));
  $$('.page').forEach(p=>p.classList.toggle('active',p.id===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

function initFilters(){
  const cos=[...new Set(SITES.map(s=>s.co))];
  $('#fCompany').innerHTML='<option value="ALL">All companies</option>'+cos.map(c=>`<option>${c}</option>`).join('');
  function fillSites(){
    const list=SITES.filter(s=>scope.company==='ALL'||s.co===scope.company);
    $('#fSite').innerHTML='<option value="ALL">All sites</option>'+list.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  }
  fillSites();
  const fams=[...new Set(AGENTS.map(a=>a.family))];
  $('#fFamily').innerHTML='<option value="ALL">All families</option>'+fams.map(f=>`<option>${f}</option>`).join('');

  $('#fCompany').onchange=e=>{scope.company=e.target.value;scope.site='ALL';fillSites();renderAll();};
  $('#fSite').onchange=e=>{scope.site=e.target.value;renderAll();};
  $('#fCycle').onchange=e=>{scope.cycle=e.target.value;renderAll();};
  $('#fFamily').onchange=e=>{scope.family=e.target.value;renderAgents();};
}

document.addEventListener('DOMContentLoaded',()=>{
  initFilters();
  renderRegisters();renderWhy();renderRef();
  renderAll();
  $$('.tab').forEach(t=>t.onclick=()=>goPage(t.dataset.page));
  $('#themeBtn').onclick=()=>{
    const h=document.documentElement;
    h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';
    setTimeout(()=>{renderBubble();renderRisk();},10);
  };
  $('#refreshBtn').onclick=()=>loadLive();
  loadLive();
  setInterval(loadLive, LIVE.refreshMin*60*1000);
});
</script>
